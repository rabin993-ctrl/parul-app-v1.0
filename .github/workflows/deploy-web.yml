name: Deploy web to Vercel (prebuilt)

# GitHub is the source of truth: on push to main it BUILDS the Expo web export
# here (using EXPO_PUBLIC_* from repo secrets) and ships the prebuilt output to
# Vercel, which only serves it. CI has no .env file, so the build env is supplied
# explicitly via the `env:` block on the build step.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-web-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Informational for now (pre-existing tsc errors don't affect the build).
      # Flip continue-on-error to false to make it a hard gate once cleaned up.
      - name: Typecheck (non-blocking)
        run: npm run tsc
        continue-on-error: true

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      # Pull project settings/link only — then delete the pulled env files so the
      # build uses the EXPO_PUBLIC_* from the GitHub secrets below (authoritative),
      # not Vercel's (which CI can't fully decrypt).
      - name: Link Vercel project
        run: |
          vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          rm -f .vercel/.env.production.local .vercel/.env.preview.local .vercel/.env.development.local
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Build in CI (Expo web export via vercel build)
        run: vercel build --prod --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_CDN_URL: ${{ secrets.EXPO_PUBLIC_CDN_URL }}
          EXPO_PUBLIC_BETA_FEEDBACK_ENABLED: ${{ secrets.EXPO_PUBLIC_BETA_FEEDBACK_ENABLED }}
          EXPO_PUBLIC_APP_TUTORIAL_ENABLED: ${{ secrets.EXPO_PUBLIC_APP_TUTORIAL_ENABLED }}

      - name: Deploy prebuilt output to production
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
