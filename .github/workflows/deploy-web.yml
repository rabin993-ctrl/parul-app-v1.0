name: Deploy web to Vercel (prebuilt)

# GitHub is the source of truth: on every push to main, GitHub Actions builds the
# Expo web export here and ships the already-built output to Vercel (--prebuilt),
# so Vercel only serves it (no rebuild on Vercel's side).
on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Never run two production deploys at once; newer push wins.
concurrency:
  group: deploy-web-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Typecheck is informational for now (the project has pre-existing tsc
      # errors that don't affect the Babel/Metro build). Flip continue-on-error
      # to false once those are cleaned up to make this a hard deploy gate.
      - name: Typecheck (non-blocking)
        run: npm run tsc
        continue-on-error: true

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      # Pulls project settings + the Production EXPO_PUBLIC_* env vars from Vercel,
      # so the build inlines the same values Vercel uses (no need to duplicate
      # them as GitHub secrets).
      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Build (runs npm run build:web via vercel build)
        run: vercel build --prod --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Deploy prebuilt output to production
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
